name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: shopify-data-ltv
  REGION: europe-west1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------
  # Détecte quels dossiers ont changé (git diff natif)
  # -------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      lpl_club: ${{ steps.check.outputs.lpl_club }}
      referral: ${{ steps.check.outputs.referral }}
      referral_portal: ${{ steps.check.outputs.referral_portal }}
      dashboard: ${{ steps.check.outputs.dashboard }}
      referral_dashboard: ${{ steps.check.outputs.referral_dashboard }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          BASE=${{ github.event_name == 'push' && 'HEAD~1' || 'HEAD' }}
          CHANGED=$(git diff --name-only $BASE HEAD 2>/dev/null || git diff --name-only HEAD)
          echo "lpl_club=$(echo "$CHANGED" | grep -q '^lpl_club/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "referral=$(echo "$CHANGED" | grep -q '^referral/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "referral_portal=$(echo "$CHANGED" | grep -q '^referral_portal_shopify/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "dashboard=$(echo "$CHANGED" | grep -q '^lpl_club_hq_dashboard/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "referral_dashboard=$(echo "$CHANGED" | grep -q '^referral_hq_dashboard/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "--- Fichiers modifiés ---"
          echo "$CHANGED"

  # -------------------------------------------------------
  # lpl-club-sync  ←  lpl_club/
  # -------------------------------------------------------
  deploy-lpl-club-sync:
    needs: changes
    if: needs.changes.outputs.lpl_club == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy lpl-club-sync
        run: |
          gcloud run deploy lpl-club-sync \
            --source lpl_club/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  # -------------------------------------------------------
  # Services referral/ (webhook + crons)
  # -------------------------------------------------------
  deploy-referral-services:
    needs: changes
    if: needs.changes.outputs.referral == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy data-cron-sync
        run: |
          gcloud run deploy data-cron-sync \
            --source referral/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet
      - name: Deploy klaviyo-referral-sync
        run: |
          gcloud run deploy klaviyo-referral-sync \
            --source referral/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet
      - name: Deploy app-webhook
        run: |
          gcloud run deploy app-webhook \
            --source referral/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  # -------------------------------------------------------
  # app-api-shopify  ←  referral_portal_shopify/
  # -------------------------------------------------------
  deploy-portail-client:
    needs: changes
    if: needs.changes.outputs.referral_portal == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy app-api-shopify
        run: |
          gcloud run deploy app-api-shopify \
            --source referral_portal_shopify/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  # -------------------------------------------------------
  # app-hq-dashboard  ←  referral_hq_dashboard/
  # -------------------------------------------------------
  deploy-referral-dashboard:
    needs: changes
    if: needs.changes.outputs.referral_dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy app-hq-dashboard
        run: |
          gcloud run deploy app-hq-dashboard \
            --source referral_hq_dashboard/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  # -------------------------------------------------------
  # app-lpl-club-dashboard  ←  lpl_club_hq_dashboard/
  # -------------------------------------------------------
  deploy-dashboard:
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy app-lpl-club-dashboard
        run: |
          gcloud run deploy app-lpl-club-dashboard \
            --source lpl_club_hq_dashboard/ \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet
